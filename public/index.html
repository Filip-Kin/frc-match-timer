<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRC Match Timer</title>
  <style>
    :root {
      --blue:   #1a3afe;
      --red:    #d40000;
      --purple: #8800cc;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Courier New', 'Consolas', monospace;
      background-color: var(--blue);
    }

    #container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
    }

    #timer {
      font-size: clamp(100px, 28vw, 320px);
      font-weight: 900;
      color: #ffffff;
      letter-spacing: 0.05em;
      line-height: 1;
      text-shadow: 0 4px 40px rgba(0,0,0,0.4);
      font-variant-numeric: tabular-nums;
    }

    #label {
      font-size: clamp(24px, 5vw, 72px);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.2em;
      margin-top: 1rem;
      min-height: 1.2em;
      text-align: center;
      text-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    #hint {
      position: fixed;
      bottom: 2rem;
      width: 100%;
      text-align: center;
      font-size: clamp(14px, 2vw, 28px);
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.15em;
    }
    #hint.hidden { display: none; }

    #shift-indicator {
      position: fixed;
      bottom: 2rem;
      width: 100%;
      text-align: center;
      font-size: clamp(16px, 2.5vw, 32px);
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.15em;
    }
    #shift-indicator.hidden { display: none; }

    #conn-dot {
      position: fixed;
      top: 1.5rem;
      left: 2rem;
      font-size: clamp(12px, 1.5vw, 20px);
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.1em;
    }

    #qr-panel {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: #fff;
      padding: 8px 8px 6px 8px;
      border-radius: 6px;
      text-align: center;
      opacity: 0.88;
    }
    #qr-panel.hidden { display: none; }

    #qr-id {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      font-weight: 900;
      color: #000;
      letter-spacing: 0.18em;
      margin-top: 4px;
    }

    body.estop-active { animation: estop-flash 0.5s infinite; }
    @keyframes estop-flash {
      0%, 100% { background-color: #cc2200; }
      50%       { background-color: #440000; }
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="timer">--:--</div>
    <div id="label">CONNECTING...</div>
  </div>
  <div id="hint" class="hidden"></div>
  <div id="shift-indicator" class="hidden"></div>
  <div id="conn-dot">●</div>
  <div id="qr-panel" class="hidden">
    <img id="qr-img" width="120" height="120" alt="QR">
    <div id="qr-id"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>
    const timerEl = document.getElementById('timer');
    const labelEl = document.getElementById('label');
    const hintEl  = document.getElementById('hint');
    const shiftEl = document.getElementById('shift-indicator');
    const connDot = document.getElementById('conn-dot');
    const qrPanel = document.getElementById('qr-panel');
    const qrImg   = document.getElementById('qr-img');
    const qrIdEl  = document.getElementById('qr-id');

    const sounds = {
      autoStart:   new Audio('/sounds/CHARGE.wav'),
      autoEnd:     new Audio('/sounds/ENDMATCH.wav'),
      teleopStart: new Audio('/sounds/3BELLS.wav'),
      warn:        new Audio('/sounds/WARNEOM.wav'),
      end:         new Audio('/sounds/ENDMATCH.wav'),
      shiftChange: new Audio('/sounds/PowerUp_LinearPop.wav'),
    };
    Object.values(sounds).forEach(a => { a.preload = 'auto'; });

    function playSound(name) {
      const a = sounds[name];
      if (!a) return;
      a.currentTime = 0;
      a.play().catch(() => {});
    }

    let audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new AudioContext();
      return audioCtx;
    }

    function playFoghorn() {
      const ctx = getAudioCtx();
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      const t = ctx.currentTime;
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(220, t);
      osc.frequency.exponentialRampToValueAtTime(90, t + 2.5);
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.8, t + 0.2);
      gain.gain.setValueAtTime(0.8, t + 2.0);
      gain.gain.linearRampToValueAtTime(0, t + 2.8);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 3);
    }

    document.addEventListener('click', () => {
      getAudioCtx().resume().catch(() => {});
    }, { once: true });

    function formatTime(s) {
      return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
    }

    function applyBg(shift) {
      document.body.classList.remove('estop-active');
      const map = { red: '#d40000', blue: '#1a3afe', purple: '#8800cc' };
      document.body.style.backgroundColor = map[shift] ?? '#1a3afe';
    }

    function handleState(msg) {
      if (msg.type !== 'state') return;
      const { period, remaining, shift, isEndgame, nextChangeIn, events } = msg;

      for (const ev of events) {
        if (ev === 'autoStart')   playSound('autoStart');
        if (ev === 'autoEnd')     playSound('autoEnd');
        if (ev === 'teleopStart') playSound('teleopStart');
        if (ev === 'warn')        playSound('warn');
        if (ev === 'end')         playSound('end');
        if (ev === 'shiftChange') playSound('shiftChange');
        if (ev === 'estop')       playFoghorn();
      }

      timerEl.textContent = formatTime(remaining);

      switch (period) {
        case 'idle':
          applyBg(null);
          labelEl.textContent = '';
          hintEl.textContent = 'WAITING FOR CONTROL';
          hintEl.classList.remove('hidden');
          shiftEl.classList.add('hidden');
          break;

        case 'auto':
          applyBg(null);
          labelEl.textContent = 'AUTO';
          hintEl.classList.add('hidden');
          shiftEl.classList.add('hidden');
          break;

        case 'delay':
          applyBg(null);
          labelEl.textContent = 'DELAY';
          hintEl.classList.add('hidden');
          shiftEl.classList.add('hidden');
          break;

        case 'teleop':
          applyBg(shift);
          hintEl.classList.add('hidden');
          if (shift === 'purple') {
            labelEl.textContent = 'TRANSITION';
            shiftEl.classList.add('hidden');
          } else if (isEndgame) {
            labelEl.textContent = 'ENDGAME';
            shiftEl.classList.add('hidden');
          } else {
            labelEl.textContent = '';
            const cd = nextChangeIn != null ? ` — ${nextChangeIn}s` : '';
            shiftEl.textContent = `${(shift ?? 'BLUE').toUpperCase()} SHIFT IS ACTIVE${cd}`;
            shiftEl.classList.remove('hidden');
          }
          break;

        case 'end_hold':
          applyBg(shift);
          labelEl.textContent = 'MATCH OVER';
          hintEl.classList.add('hidden');
          shiftEl.classList.add('hidden');
          break;

        case 'estop':
          document.body.classList.add('estop-active');
          document.body.style.backgroundColor = '';
          labelEl.textContent = 'E-STOP';
          hintEl.classList.add('hidden');
          shiftEl.classList.add('hidden');
          break;
      }
    }

    function setupQR(id) {
      if (typeof QRCode === 'undefined') { setTimeout(() => setupQR(id), 100); return; }
      const url = `https://timer.filipkin.com/control?id=${id}`;
      QRCode.toDataURL(url, { width: 120, margin: 1 }, function(err, dataUrl) {
        if (!err) {
          qrImg.src = dataUrl;
          qrIdEl.textContent = id.toUpperCase();
          qrPanel.classList.remove('hidden');
        }
      });
    }

    function connect() {
      const storedId = localStorage.getItem('timerId');
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const params = new URLSearchParams({ role: 'display' });
      if (storedId) params.set('id', storedId);
      const ws = new WebSocket(`${proto}//${location.host}/ws?${params}`);

      ws.onopen = () => { connDot.style.color = 'rgba(255,255,255,0.4)'; };
      ws.onmessage = e => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'registered') {
          localStorage.setItem('timerId', msg.id);
          setupQR(msg.id);
        } else {
          handleState(msg);
        }
      };
      ws.onclose = () => {
        connDot.style.color = 'rgba(255,100,100,0.8)';
        setTimeout(connect, 2000);
      };
      ws.onerror = () => ws.close();
    }

    connect();
  </script>
</body>
</html>
