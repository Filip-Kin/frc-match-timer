<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match Timer — Control</title>
  <style>
    :root {
      --bg:         #0f0f0f;
      --surface:    #1a1a1a;
      --border:     #2e2e2e;
      --text:       #e0e0e0;
      --muted:      #5a5a5a;
      --green:      #22c55e;
      --red:        #ef4444;
      --amber:      #f59e0b;
      --blue:       #3b82f6;
      --purple:     #a855f7;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100%;
      font-family: 'Courier New', Consolas, monospace;
      background: var(--bg);
      color: var(--text);
    }

    /* ── ID entry screen ── */
    #id-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.5rem;
      padding: 2rem;
    }
    #id-screen h1 {
      font-size: 1.2rem;
      letter-spacing: 0.25em;
      color: var(--muted);
    }
    #id-input {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 0.5rem;
      color: var(--text);
      font-family: inherit;
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 0.3em;
      text-align: center;
      text-transform: uppercase;
      padding: 0.75rem 1.25rem;
      width: 100%;
      max-width: 320px;
      transition: border-color 0.15s;
    }
    #id-input:focus { outline: none; border-color: var(--blue); }
    #id-input::placeholder { color: var(--muted); letter-spacing: 0.2em; }
    #id-connect {
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      padding: 0.9rem 2.5rem;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      background: var(--blue);
      color: #fff;
      text-transform: uppercase;
      transition: opacity 0.15s;
    }
    #id-connect:hover { opacity: 0.85; }
    #id-hint { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.1em; }

    /* ── Main control screen ── */
    #main-screen { display: none; }

    .page {
      max-width: 560px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    h1 { font-size: 1.1rem; letter-spacing: 0.2em; font-weight: 700; }

    .badge {
      padding: 0.2rem 0.8rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .badge-idle       { background: #222;    color: #777; }
    .badge-auto       { background: #0c3060; color: #60b0ff; }
    .badge-delay      { background: #2a1800; color: #f59e0b; }
    .badge-running    { background: #14532d; color: #4ade80; }
    .badge-transition { background: #2d0050; color: #c084fc; }
    .badge-endgame    { background: #451a03; color: #fbbf24; }
    .badge-end_hold   { background: #451a03; color: #fbbf24; }
    .badge-estop      { background: #450a0a; color: #f87171; }

    .timer-display {
      text-align: center;
      font-size: clamp(64px, 18vw, 128px);
      font-weight: 900;
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card-title {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.9rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .field label {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .field input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 0.35rem;
      color: var(--text);
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 0.5rem 0.75rem;
      width: 100%;
      transition: border-color 0.15s;
    }
    .field input:focus { outline: none; border-color: var(--blue); }

    .field .hint { font-size: 0.65rem; color: var(--muted); }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.75rem;
    }

    .btn {
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 1.1rem 0.5rem;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      text-transform: uppercase;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active:not(:disabled) { transform: scale(0.97); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-start { background: var(--green); color: #fff; }
    .btn-estop { background: var(--red);   color: #fff; }
    .btn-reset { background: var(--amber); color: #111; }

    .conn {
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--muted);
    }
    .conn.ok   { color: #4ade80; }
    .conn.fail { color: #f87171; }
  </style>
</head>
<body>

  <!-- ID entry (shown when no ?id= in URL) -->
  <div id="id-screen">
    <h1>MATCH TIMER</h1>
    <input id="id-input" type="text" maxlength="6" placeholder="XXXXXX" autocomplete="off" spellcheck="false">
    <button id="id-connect">Connect</button>
    <span id="id-hint">Enter the 6-character ID shown on the display</span>
  </div>

  <!-- Main control UI -->
  <div id="main-screen">
    <div class="page">
      <div class="header">
        <h1>MATCH TIMER</h1>
        <span class="badge badge-idle" id="badge">IDLE</span>
      </div>

      <div class="timer-display" id="timer">0:20</div>

      <div class="card">
        <div class="card-title">Configuration</div>
        <div class="fields">
          <div class="field">
            <label for="cfg-auto">Auto Time (sec)</label>
            <input type="number" id="cfg-auto" value="20" min="1" max="9999">
            <span class="hint">Default: 20</span>
          </div>
          <div class="field">
            <label for="cfg-delay">Delay Time (sec)</label>
            <input type="number" id="cfg-delay" value="3" min="0" max="60">
            <span class="hint">Default: 3</span>
          </div>
          <div class="field">
            <label for="cfg-trans">Transition (sec)</label>
            <input type="number" id="cfg-trans" value="10" min="0" max="9999">
            <span class="hint">Default: 10</span>
          </div>
          <div class="field">
            <label for="cfg-shift">Shift Time (sec)</label>
            <input type="number" id="cfg-shift" value="25" min="1" max="9999">
            <span class="hint">Default: 25 × 4 shifts</span>
          </div>
          <div class="field">
            <label for="cfg-endgame">Endgame (sec)</label>
            <input type="number" id="cfg-endgame" value="30" min="0" max="9999">
            <span class="hint">Default: 30</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Controls</div>
        <div class="buttons">
          <button class="btn btn-start" id="btn-start" disabled>START</button>
          <button class="btn btn-estop" id="btn-estop" disabled>E-STOP</button>
          <button class="btn btn-reset" id="btn-reset">RESET</button>
        </div>
      </div>

      <div class="conn fail" id="conn">● DISCONNECTED</div>
    </div>
  </div>

  <script>
    const params   = new URLSearchParams(location.search);
    const idScreen = document.getElementById('id-screen');
    const mainScreen = document.getElementById('main-screen');
    const idInput  = document.getElementById('id-input');
    const idBtn    = document.getElementById('id-connect');

    // ── ID entry ──
    function connectWithId(id) {
      id = id.toLowerCase().replace(/[^a-z0-9]/g, '');
      if (id.length !== 6) { idInput.focus(); return; }
      const url = new URL(location.href);
      url.searchParams.set('id', id);
      location.href = url.toString();
    }

    idBtn.addEventListener('click', () => connectWithId(idInput.value));
    idInput.addEventListener('keydown', e => { if (e.key === 'Enter') connectWithId(idInput.value); });

    const sessionId = params.get('id')?.toLowerCase().replace(/[^a-z0-9]/g, '') ?? '';

    if (!sessionId) {
      idScreen.style.display = 'flex';
    } else {
      idScreen.style.display = 'none';
      mainScreen.style.display = 'block';
      startControl(sessionId);
    }

    // ── Control UI ──
    function startControl(id) {
      const timerEl   = document.getElementById('timer');
      const badgeEl   = document.getElementById('badge');
      const connEl    = document.getElementById('conn');
      const btnStart  = document.getElementById('btn-start');
      const btnEstop  = document.getElementById('btn-estop');
      const btnReset  = document.getElementById('btn-reset');
      const cfgAuto   = document.getElementById('cfg-auto');
      const cfgDelay  = document.getElementById('cfg-delay');
      const cfgTrans  = document.getElementById('cfg-trans');
      const cfgShift  = document.getElementById('cfg-shift');
      const cfgEndgame = document.getElementById('cfg-endgame');

      let ws = null;

      function fmt(s) {
        return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
      }

      function send(msg) {
        if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg));
      }

      function sendConfig() {
        send({
          type: 'config',
          autoTime:      parseInt(cfgAuto.value,    10),
          delayTime:     parseInt(cfgDelay.value,   10),
          transitionTime: parseInt(cfgTrans.value,  10),
          shiftTime:     parseInt(cfgShift.value,   10),
          endgameTime:   parseInt(cfgEndgame.value, 10),
        });
      }

      function getPhaseBadge(period, shift, isEndgame) {
        if (period === 'idle')     return ['IDLE',       'badge-idle'];
        if (period === 'auto')     return ['AUTO',        'badge-auto'];
        if (period === 'delay')    return ['DELAY',       'badge-delay'];
        if (period === 'end_hold') return ['MATCH OVER',  'badge-end_hold'];
        if (period === 'estop')    return ['E-STOP',      'badge-estop'];
        if (period === 'teleop') {
          if (shift === 'purple') return ['TRANSITION',  'badge-transition'];
          if (isEndgame)          return ['ENDGAME',     'badge-endgame'];
          return [`${(shift ?? 'BLUE').toUpperCase()} SHIFT`, 'badge-running'];
        }
        return [period.toUpperCase(), 'badge-idle'];
      }

      function applyState(msg) {
        const { period, remaining, config, shift, isEndgame } = msg;

        timerEl.textContent = fmt(remaining);

        const [label, cls] = getPhaseBadge(period, shift, isEndgame);
        badgeEl.textContent = label;
        badgeEl.className = `badge ${cls}`;

        btnStart.disabled = period !== 'idle';
        btnEstop.disabled = !['auto', 'delay', 'teleop', 'end_hold'].includes(period);

        if (document.activeElement !== cfgAuto)    cfgAuto.value    = config.autoTime;
        if (document.activeElement !== cfgDelay)   cfgDelay.value   = config.delayTime;
        if (document.activeElement !== cfgTrans)   cfgTrans.value   = config.transitionTime;
        if (document.activeElement !== cfgShift)   cfgShift.value   = config.shiftTime;
        if (document.activeElement !== cfgEndgame) cfgEndgame.value = config.endgameTime;
      }

      function connect() {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${proto}//${location.host}/ws?role=control&id=${id}`);

        ws.onopen = () => {
          connEl.textContent = '● CONNECTED';
          connEl.className = 'conn ok';
        };
        ws.onmessage = e => {
          const msg = JSON.parse(e.data);
          if (msg.type === 'state') applyState(msg);
        };
        ws.onclose = () => {
          connEl.textContent = '● DISCONNECTED';
          connEl.className = 'conn fail';
          ws = null;
          setTimeout(connect, 2000);
        };
        ws.onerror = () => ws.close();
      }

      btnStart.addEventListener('click', () => send({ type: 'start' }));
      btnEstop.addEventListener('click', () => send({ type: 'estop' }));
      btnReset.addEventListener('click', () => send({ type: 'reset' }));

      [cfgAuto, cfgDelay, cfgTrans, cfgShift, cfgEndgame].forEach(el => {
        el.addEventListener('change', sendConfig);
        el.addEventListener('keydown', e => { if (e.key === 'Enter') sendConfig(); });
      });

      connect();
    }
  </script>
</body>
</html>
