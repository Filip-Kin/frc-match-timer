<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match Timer — Control</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2e2e2e;
      --text: #e0e0e0;
      --muted: #5a5a5a;
      --green: #22c55e;
      --red: #ef4444;
      --amber: #f59e0b;
      --blue: #3b82f6;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100%;
      font-family: 'Courier New', Consolas, monospace;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 540px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    h1 {
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      font-weight: 700;
    }

    .badge {
      padding: 0.2rem 0.8rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .badge-idle     { background: #222; color: #777; }
    .badge-running  { background: #14532d; color: #4ade80; }
    .badge-end_hold { background: #451a03; color: #fbbf24; }
    .badge-estop    { background: #450a0a; color: #f87171; }

    .timer-display {
      text-align: center;
      font-size: clamp(64px, 18vw, 128px);
      font-weight: 900;
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--text);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card-title {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .field label {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .field input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 0.35rem;
      color: var(--text);
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 0.5rem 0.75rem;
      width: 100%;
      transition: border-color 0.15s;
    }

    .field input:focus {
      outline: none;
      border-color: var(--blue);
    }

    .field .hint {
      font-size: 0.65rem;
      color: var(--muted);
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.75rem;
    }

    .btn {
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 1.1rem 0.5rem;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      text-transform: uppercase;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active:not(:disabled) { transform: scale(0.97); }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn-start { background: var(--green); color: #fff; }
    .btn-estop { background: var(--red);   color: #fff; }
    .btn-reset { background: var(--amber); color: #111; }

    .conn {
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .conn.ok   { color: #4ade80; }
    .conn.fail { color: #f87171; }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1>MATCH TIMER</h1>
      <span class="badge badge-idle" id="badge">IDLE</span>
    </div>

    <div class="timer-display" id="timer">2:30</div>

    <div class="card">
      <div class="card-title">Configuration</div>
      <div class="fields">
        <div class="field">
          <label for="match-time">Match Time (sec)</label>
          <input type="number" id="match-time" value="150" min="1" max="9999">
          <span class="hint">Default: 150 (2:30)</span>
        </div>
        <div class="field">
          <label for="shift-time">Shift Time (sec)</label>
          <input type="number" id="shift-time" value="-1" min="-1" max="9999">
          <span class="hint">-1 = no shifts</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Controls</div>
      <div class="buttons">
        <button class="btn btn-start" id="btn-start" disabled>START</button>
        <button class="btn btn-estop" id="btn-estop" disabled>E-STOP</button>
        <button class="btn btn-reset" id="btn-reset">RESET</button>
      </div>
    </div>

    <div class="conn fail" id="conn">● DISCONNECTED</div>
  </div>

  <script>
    const timerEl  = document.getElementById('timer');
    const badgeEl  = document.getElementById('badge');
    const connEl   = document.getElementById('conn');
    const btnStart = document.getElementById('btn-start');
    const btnEstop = document.getElementById('btn-estop');
    const btnReset = document.getElementById('btn-reset');
    const inputMatchTime = document.getElementById('match-time');
    const inputShiftTime = document.getElementById('shift-time');

    let ws = null;

    function fmt(s) {
      return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
    }

    function send(msg) {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg));
    }

    function sendConfig() {
      const mt = parseInt(inputMatchTime.value, 10);
      const st = parseInt(inputShiftTime.value, 10);
      if (!isNaN(mt) && mt > 0 && !isNaN(st)) send({ type: 'config', matchTime: mt, shiftTime: st });
    }

    const BADGE_LABELS = {
      idle:     ['IDLE',       'badge-idle'],
      running:  ['RUNNING',    'badge-running'],
      end_hold: ['MATCH OVER', 'badge-end_hold'],
      estop:    ['E-STOP',     'badge-estop'],
    };

    function applyState(state, remaining, config) {
      timerEl.textContent = fmt(remaining);

      const [label, cls] = BADGE_LABELS[state] ?? [state.toUpperCase(), 'badge-idle'];
      badgeEl.textContent = label;
      badgeEl.className = `badge ${cls}`;

      btnStart.disabled = state !== 'idle';
      btnEstop.disabled = state !== 'running' && state !== 'end_hold';

      if (document.activeElement !== inputMatchTime) inputMatchTime.value = config.matchTime;
      if (document.activeElement !== inputShiftTime) inputShiftTime.value = config.shiftTime;
    }

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/ws`);

      ws.onopen = () => {
        connEl.textContent = '● CONNECTED';
        connEl.className = 'conn ok';
        btnStart.disabled = false; // will be corrected by first state message
      };

      ws.onmessage = e => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'state') applyState(msg.state, msg.remaining, msg.config);
      };

      ws.onclose = () => {
        connEl.textContent = '● DISCONNECTED';
        connEl.className = 'conn fail';
        ws = null;
        setTimeout(connect, 2000);
      };

      ws.onerror = () => ws.close();
    }

    btnStart.addEventListener('click', () => send({ type: 'start' }));
    btnEstop.addEventListener('click', () => send({ type: 'estop' }));
    btnReset.addEventListener('click', () => send({ type: 'reset' }));

    inputMatchTime.addEventListener('change', sendConfig);
    inputMatchTime.addEventListener('keydown', e => { if (e.key === 'Enter') sendConfig(); });
    inputShiftTime.addEventListener('change', sendConfig);
    inputShiftTime.addEventListener('keydown', e => { if (e.key === 'Enter') sendConfig(); });

    connect();
  </script>
</body>
</html>
